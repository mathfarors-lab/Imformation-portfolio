<!doctype html>
<html>
  <head>
    <base target="_top" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Moul&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #092743;
        color: white;
        font-family: "Inter", sans-serif;
        min-height: 100vh;
      }
      .gold-text {
        color: #cb9b51;
      }
      .gold-bg {
        background: linear-gradient(
          135deg,
          #f6e27a 0%,
          #d0a446 50%,
          #aa7c11 100%
        );
      }
      .input-field {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(203, 155, 81, 0.3);
        border-radius: 12px;
        padding: 10px;
        width: 100%;
        color: white;
        margin-bottom: 10px;
        outline: none;
        transition: 0.3s;
      }
      .input-field:focus {
        border-color: #f6e27a;
        background: rgba(255, 255, 255, 0.1);
      }
      .btn-action {
        transition:
          transform 0.2s,
          opacity 0.2s;
        cursor: pointer;
      }
      .btn-action:hover {
        transform: scale(1.02);
      }
      .btn-action:active {
        transform: scale(0.98);
      }
      .loading-overlay {
        background: rgba(9, 39, 67, 0.8);
        backdrop-blur: 5px;
      }
    </style>
  </head>
  <body class="p-4 sm:p-8">
    <!-- Login Overlay -->
    <div
      id="login-overlay"
      class="fixed inset-0 z-[200] flex items-center justify-center bg-[#092743]"
    >
      <div
        class="bg-[#0c3359] border border-[#cb9b51]/30 p-8 rounded-[40px] w-full max-w-md text-center shadow-2xl"
      >
        <h2 class="text-2xl font-bold gold-text mb-6 font-['Moul']">
          Admin Login
        </h2>
        <input
          type="password"
          id="admin-pass-input"
          class="input-field text-center mb-6"
          placeholder="Enter Admin Password"
        />
        <button
          onclick="checkLogin()"
          class="gold-bg text-black w-full py-3 rounded-full font-bold btn-action"
        >
          Login
        </button>
        <p id="login-error" class="text-red-500 text-xs mt-4 hidden">
          Access Denied: Incorrect Password
        </p>
      </div>
    </div>
    <!-- Loading Spinner -->
    <div
      id="loading"
      class="fixed inset-0 z-[100] hidden items-center justify-center loading-overlay"
    >
      <div class="flex flex-col items-center">
        <div
          class="w-12 h-12 border-4 border-t-[#cb9b51] border-white/20 rounded-full animate-spin mb-4"
        ></div>
        <p class="gold-text font-bold animate-pulse">Processing...</p>
      </div>
    </div>

    <div class="max-w-6xl mx-auto">
      <div
        class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-10"
      >
        <div>
          <h1 class="text-3xl font-bold gold-text font-['Moul']">
            Card Manager
          </h1>
          <p class="text-white/50 text-xs tracking-widest uppercase">
            Rumduol Premium Edition
          </p>
        </div>
        <button
          onclick="openModal()"
          class="gold-bg text-black px-8 py-3 rounded-full font-bold shadow-lg btn-action"
        >
          + Create New Card
        </button>
      </div>

      <!-- Stats & Search -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
        <input
          type="text"
          id="search"
          onkeyup="renderUsers()"
          placeholder="Search by name or title..."
          class="input-field"
        />
        <div class="flex items-center justify-end px-4 text-sm text-white/60">
          Total Users:
          <span id="user-count" class="gold-text font-bold ml-2">0</span>
        </div>
      </div>

      <!-- User List -->
      <div
        id="user-list"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      >
        <!-- User cards will appear here -->
      </div>
    </div>

    <!-- Modal Form -->
    <div
      id="modal"
      class="fixed inset-0 bg-black/90 hidden items-center justify-center p-4 z-50 overflow-y-auto"
    >
      <div
        class="bg-[#0c3359] border border-[#cb9b51]/30 rounded-[40px] p-8 w-full max-w-3xl my-8 shadow-2xl relative"
      >
        <button
          onclick="closeModal()"
          class="absolute top-6 right-6 text-white/50 hover:text-white"
        >
          &times; Close
        </button>

        <h2
          id="modal-title"
          class="text-2xl font-bold gold-text mb-8 font-['Moul']"
        >
          New Identity Card
        </h2>

        <form id="user-form" onsubmit="handleSubmit(event)">
          <input type="hidden" id="user-id" />

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- BASIC INFO -->
            <div class="space-y-4">
              <div>
                <label
                  class="block text-[10px] gold-text mb-1 uppercase tracking-widest font-bold"
                  >Full Name</label
                >
                <input
                  type="text"
                  id="name"
                  class="input-field"
                  placeholder="e.g. Sok Dara"
                  required
                />
              </div>
              <div>
                <label
                  class="block text-[10px] gold-text mb-1 uppercase tracking-widest font-bold"
                  >Job Title / Rank</label
                >
                <input
                  type="text"
                  id="title"
                  class="input-field"
                  placeholder="e.g. CEO of Farors"
                />
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label
                    class="block text-[10px] gold-text mb-1 uppercase tracking-widest font-bold"
                    >Logo (Image)</label
                  >
                  <input
                    type="file"
                    id="logo_file"
                    accept="image/*"
                    class="input-field text-xs"
                  />
                  <input type="hidden" id="logo_img" />
                </div>
                <div>
                  <label
                    class="block text-[10px] gold-text mb-1 uppercase tracking-widest font-bold"
                    >Profile (Image)</label
                  >
                  <input
                    type="file"
                    id="profile_file"
                    accept="image/*"
                    class="input-field text-xs"
                  />
                  <input type="hidden" id="profile_img" />
                </div>
              </div>
            </div>

            <!-- SOCIAL LINKS -->
            <div class="space-y-2">
              <label
                class="block text-[10px] gold-text mb-2 uppercase tracking-widest font-bold"
                >Connections</label
              >
              <input
                type="text"
                id="facebook"
                placeholder="Facebook URL"
                class="input-field text-sm"
              />
              <input
                type="text"
                id="telegram"
                placeholder="Telegram Username (without @)"
                class="input-field text-sm"
              />
              <input
                type="text"
                id="whatsapp"
                placeholder="WhatsApp Number (e.g. 855...)"
                class="input-field text-sm"
              />
              <input
                type="text"
                id="tiktok"
                placeholder="TikTok URL"
                class="input-field text-sm"
              />
              <input
                type="text"
                id="linkedin"
                placeholder="LinkedIn URL"
                class="input-field text-sm"
              />
              <input
                type="text"
                id="email"
                placeholder="Email Address"
                class="input-field text-sm"
              />
              <input
                type="text"
                id="website"
                placeholder="Website URL"
                class="input-field text-sm"
              />
            </div>
          </div>

          <!-- DYNAMIC PHONES -->
          <div class="mt-6">
            <label
              class="block text-[10px] gold-text mb-2 uppercase tracking-widest font-bold"
              >Phone Numbers (Click + to add more)</label
            >
            <div
              id="phone-container"
              class="grid grid-cols-1 sm:grid-cols-2 gap-2"
            >
              <!-- First phone field always exists -->
              <div class="flex gap-2">
                <input
                  type="text"
                  class="phone-input input-field text-sm mb-0"
                  placeholder="Primary Phone"
                />
                <button
                  type="button"
                  onclick="addPhoneField()"
                  class="bg-green-600/20 text-green-400 border border-green-600/30 px-4 rounded-xl hover:bg-green-600 hover:text-white transition-all"
                >
                  +
                </button>
              </div>
            </div>
          </div>

          <!-- VCF SECTION -->
          <div class="mt-8 pt-6 border-t border-white/10">
            <p
              class="text-[10px] gold-text mb-3 uppercase tracking-widest font-bold"
            >
              Contact File (VCF) Customization
            </p>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
              <input
                type="text"
                id="vcf_first"
                placeholder="VCF First Name"
                class="input-field text-sm"
              />
              <input
                type="text"
                id="vcf_last"
                placeholder="VCF Last Name"
                class="input-field text-sm"
              />
              <input
                type="text"
                id="vcf_org"
                placeholder="Organization/Company"
                class="input-field text-sm"
              />
            </div>
          </div>

          <div class="flex justify-end gap-4 mt-10">
            <button
              type="button"
              onclick="closeModal()"
              class="px-8 py-3 rounded-full border border-white/10 hover:bg-white/5 transition-all"
            >
              Cancel
            </button>
            <button
              type="submit"
              id="save-btn"
              class="gold-bg text-black px-12 py-3 rounded-full font-bold shadow-xl btn-action"
            >
              Save Identity
            </button>
          </div>
        </form>
      </div>
    </div>

    <script>
      /**
       * 🛡️ RUMDUOL EDITION - SECURE ADMIN SCRIPT V2
       * ការពារដោយការបញ្ជូន Password តាម POST Method (Hidden from URL)
       */

      let allUsers = [];
      let ADMIN_SESSION_PW = "";
      const webAppUrl =
        "https://script.google.com/macros/s/AKfycbw4shX5JCs_JIfqzQWlawkMDN5naY6nRgCorNyAdeacZE-VYCuoYDJX3HXlgKDq-y64oA/exec";

      const isLocal =
        window.location.hostname === "127.0.0.1" ||
        window.location.hostname === "localhost";

      window.onload = () => {
        // មិនទាន់ឱ្យ loadUsers ទេ រហូតដល់ Login រួច
      };

      function showLoader(show) {
        const loader = document.getElementById("loading");
        if (loader) loader.style.display = show ? "flex" : "none";
      }

      /**
       * ១. មុខងារ Login (ប្រើ POST ដើម្បីឆែក Password និងទាញទិន្នន័យ)
       */
      async function checkLogin() {
        const passInput = document.getElementById("admin-pass-input");
        const errorMsg = document.getElementById("login-error");
        const pw = passInput.value;

        if (!pw) return;

        showLoader(true);
        errorMsg.classList.add("hidden");

        try {
          // 🛡️ បញ្ជូន Password ក្នុង Body (POST)
          const response = await fetch(webAppUrl, {
            method: "POST",
            body: JSON.stringify({
              action: "getUsers",
              pw: pw,
            }),
          });

          const data = await response.json();

          if (data.status === "error") {
            errorMsg.innerText = "Password មិនត្រឹមត្រូវ! សូមព្យាយាមម្ដងទៀត។";
            errorMsg.classList.remove("hidden");
            showLoader(false);
          } else {
            // បើ Password ត្រូវ រក្សាទុកក្នុង Session និងបង្ហាញទិន្នន័យ
            ADMIN_SESSION_PW = pw;
            allUsers = data;
            document.getElementById("login-overlay").style.display = "none";
            renderUsers();
            showLoader(false);
          }
        } catch (err) {
          console.error(err);
          alert("Connection Error: មិនអាចទាក់ទងទៅកាន់ Server បានទេ។");
          showLoader(false);
        }
      }

      /**
       * ២. មុខងារ Refresh បញ្ជីឈ្មោះ
       */
      async function loadUsers() {
        if (!ADMIN_SESSION_PW) return;
        showLoader(true);
        try {
          const response = await fetch(webAppUrl, {
            method: "POST",
            body: JSON.stringify({
              action: "getUsers",
              pw: ADMIN_SESSION_PW,
            }),
          });
          allUsers = await response.json();
          renderUsers();
        } catch (err) {
          console.error(err);
        }
        showLoader(false);
      }

      /**
       * ៣. មុខងារបង្ហាញប័ណ្ណលើអេក្រង់
       */
      function renderUsers() {
        const query = document.getElementById("search").value.toLowerCase();
        const container = document.getElementById("user-list");
        container.innerHTML = "";

        const filtered = allUsers.filter(
          (u) =>
            String(u.name || "")
              .toLowerCase()
              .includes(query) ||
            String(u.title || "")
              .toLowerCase()
              .includes(query),
        );

        document.getElementById("user-count").innerText = filtered.length;

        filtered.forEach((u) => {
          // 🛡️ Preview Link: ប្រើ action getPublicUser (មិនត្រូវការ Password លើ URL ទេ)
          // បើនៅ Local ប្រើ index.html ក្នុងម៉ាស៊ីន បើលើ Web ប្រើ URL WebApp
          const previewLink = isLocal
            ? `index.html?id=${u.id}`
            : `${webAppUrl}?id=${u.id}`;

          const div = document.createElement("div");
          div.className =
            "bg-white/5 border border-white/10 p-6 rounded-[30px] hover:border-[#cb9b51]/50 transition-all duration-300 shadow-xl group";
          div.innerHTML = `
        <div class="flex items-center gap-5">
          <div class="relative">
              <div class="absolute inset-0 bg-[#cb9b51] blur-md opacity-20 rounded-full"></div>
              <img src="${u.profile_img || "https://via.placeholder.com/150"}" class="w-20 h-20 rounded-full object-cover border-2 border-[#cb9b51] relative z-10" onerror="this.src='https://via.placeholder.com/150'">
          </div>
          <div class="flex-1 min-w-0">
            <h3 class="font-bold text-xl truncate text-white">${u.name || "No Name"}</h3>
            <p class="text-xs gold-text uppercase tracking-wider font-semibold truncate opacity-80">${u.title || "No Title"}</p>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-2 mt-8">
          <a href="${previewLink}" target="_blank" class="text-[10px] font-bold text-center bg-blue-600/20 text-blue-400 border border-blue-600/30 py-2 rounded-xl hover:bg-blue-600 hover:text-white transition-all uppercase">Preview</a>
          <button onclick="editUser('${u.id}')" class="text-[10px] font-bold bg-gray-600/20 text-gray-300 border border-white/10 py-2 rounded-xl hover:bg-gray-700 hover:text-white transition-all uppercase">Edit</button>
          <button onclick="confirmDelete('${u.id}')" class="text-[10px] font-bold bg-red-900/20 text-red-400 border border-red-900/30 py-2 rounded-xl hover:bg-red-600 hover:text-white transition-all uppercase">Delete</button>
        </div>
      `;
          container.appendChild(div);
        });
      }

      /**
       * ៤. មុខងាររក្សាទុកទិន្នន័យ (POST)
       */
      async function handleSubmit(e) {
        e.preventDefault();
        showLoader(true);

        const logoFile = document.getElementById("logo_file").files[0];
        const profileFile = document.getElementById("profile_file").files[0];

        let logoBase64 = document.getElementById("logo_img").value;
        let profileBase64 = document.getElementById("profile_img").value;

        if (logoFile) logoBase64 = await toBase64(logoFile);
        if (profileFile) profileBase64 = await toBase64(profileFile);

        const userData = {
          id: document.getElementById("user-id").value,
          name: document.getElementById("name").value,
          title: document.getElementById("title").value,
          logo_img: logoBase64,
          profile_img: profileBase64,
          phones: Array.from(document.querySelectorAll(".phone-input"))
            .map((i) => i.value)
            .filter((v) => v)
            .join(","),
          facebook: document.getElementById("facebook").value,
          telegram: document.getElementById("telegram").value,
          whatsapp: document.getElementById("whatsapp").value,
          linkedin: document.getElementById("linkedin").value,
          tiktok: document.getElementById("tiktok").value,
          email: document.getElementById("email").value,
          website: document.getElementById("website").value,
          vcf_first: document.getElementById("vcf_first").value,
          vcf_last: document.getElementById("vcf_last").value,
          vcf_org: document.getElementById("vcf_org").value,
        };

        try {
          const response = await fetch(webAppUrl, {
            method: "POST",
            body: JSON.stringify({
              action: "saveUser",
              userData: userData,
              pw: ADMIN_SESSION_PW,
            }),
          });

          const res = await response.json();
          if (res.status === "success") {
            alert(res.result);
            closeModal();
            loadUsers();
          } else {
            alert("កំហុស៖ " + res.message);
          }
        } catch (err) {
          alert("Error: " + err.message);
        }
        showLoader(false);
      }

      /**
       * ៥. មុខងារលុបទិន្នន័យ (POST)
       */
      async function confirmDelete(id) {
        if (!confirm("តើអ្នកប្រាកដថាចង់លុបប័ណ្ណនេះមែនទេ?")) return;
        showLoader(true);

        try {
          const response = await fetch(webAppUrl, {
            method: "POST",
            body: JSON.stringify({
              action: "deleteUser",
              id: id,
              pw: ADMIN_SESSION_PW,
            }),
          });

          const res = await response.json();
          if (res.status === "success") {
            alert(res.result);
            loadUsers();
          } else {
            alert("កំហុស៖ " + res.message);
          }
        } catch (err) {
          console.error(err);
        }
        showLoader(false);
      }

      // --- មុខងារជំនួយផ្សេងៗ (Helper Functions) ---

      function addPhoneField(val = "") {
        const container = document.getElementById("phone-container");
        const count = container.querySelectorAll(".phone-input").length;
        if (count < 5) {
          const div = document.createElement("div");
          div.className = "flex gap-2";
          div.innerHTML = `<input type="text" class="phone-input input-field text-sm mb-0" placeholder="Phone ${count + 1}" value="${val}">`;
          container.appendChild(div);
        }
      }

      function openModal() {
        document.getElementById("user-form").reset();
        document.getElementById("user-id").value = "";
        document.getElementById("modal-title").innerText = "New Identity Card";
        document.getElementById("logo_img").value = "";
        document.getElementById("profile_img").value = "";
        document.getElementById("phone-container").innerHTML = `
      <div class="flex gap-2">
          <input type="text" class="phone-input input-field text-sm mb-0" placeholder="Primary Phone">
          <button type="button" onclick="addPhoneField()" class="bg-green-600/20 text-green-400 border border-green-600/30 px-4 rounded-xl hover:bg-green-600 hover:text-white transition-all">+</button>
      </div>`;
        document.getElementById("modal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("modal").style.display = "none";
        showLoader(false);
      }

      function toBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = () => resolve(reader.result);
          reader.onerror = (error) => reject(error);
        });
      }

      function editUser(id) {
        const u = allUsers.find((user) => String(user.id) === String(id));
        if (!u) return;

        openModal();
        document.getElementById("modal-title").innerText = "Edit Identity";
        document.getElementById("user-id").value = u.id;
        document.getElementById("name").value = u.name || "";
        document.getElementById("title").value = u.title || "";
        document.getElementById("logo_img").value = u.logo_img || "";
        document.getElementById("profile_img").value = u.profile_img || "";
        document.getElementById("facebook").value = u.facebook || "";
        document.getElementById("telegram").value = u.telegram || "";
        document.getElementById("whatsapp").value = u.whatsapp || "";
        document.getElementById("linkedin").value = u.linkedin || "";
        document.getElementById("tiktok").value = u.tiktok || "";
        document.getElementById("email").value = u.email || "";
        document.getElementById("website").value = u.website || "";
        document.getElementById("vcf_first").value = u.vcf_first || "";
        document.getElementById("vcf_last").value = u.vcf_last || "";
        document.getElementById("vcf_org").value = u.vcf_org || "";

        const phoneCont = document.getElementById("phone-container");
        phoneCont.innerHTML = "";
        const phones = u.phones ? String(u.phones).split(",") : [""];
        phones.forEach((p, idx) => {
          if (idx === 0) {
            phoneCont.innerHTML = `
          <div class="flex gap-2">
              <input type="text" class="phone-input input-field text-sm mb-0" placeholder="Primary Phone" value="${p}">
              <button type="button" onclick="addPhoneField()" class="bg-green-600/20 text-green-400 border border-green-600/30 px-4 rounded-xl hover:bg-green-600 hover:text-white transition-all">+</button>
          </div>`;
          } else {
            addPhoneField(p);
          }
        });
      }
    </script>
  </body>
</html>
