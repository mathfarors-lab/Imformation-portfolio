<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Rumduol Admin - Secure Manager</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Moul&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-color: #092743;
        --gold: #cb9b51;
        --gold-gradient: linear-gradient(
          135deg,
          #f6e27a 0%,
          #d0a446 50%,
          #aa7c11 100%
        );
      }

      body {
        background-color: var(--bg-color);
        color: white;
        font-family: "Inter", sans-serif;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
      }

      .font-khmer-moul {
        font-family: "Moul", serif;
      }
      .gold-text {
        color: var(--gold);
      }
      .gold-bg {
        background: var(--gold-gradient);
      }

      /* Input Styling */
      .input-field {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(203, 155, 81, 0.3);
        border-radius: 16px;
        padding: 12px 16px;
        width: 100%;
        color: white;
        outline: none;
        transition: all 0.3s ease;
      }
      .input-field:focus {
        border-color: #f6e27a;
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 0 15px rgba(203, 155, 81, 0.2);
      }

      /* Premium Button Animation */
      .btn-premium {
        transition: all 0.2s ease;
        cursor: pointer;
        user-select: none;
      }
      .btn-premium:active {
        transform: scale(0.95);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-color);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--gold);
        border-radius: 10px;
      }

      /* Hide Content before Login */
      #main-content {
        display: none;
      }
    </style>
  </head>
  <body class="min-h-screen">
    <!-- 1. 🛡️ LOGIN OVERLAY (FULL SCREEN) -->
    <div
      id="login-overlay"
      class="fixed inset-0 z-[1000] flex items-center justify-center bg-[#092743] p-6"
    >
      <div class="w-full max-w-sm text-center">
        <div class="mb-8">
          <div
            class="w-20 h-20 mx-auto mb-4 rounded-full border-2 border-[#cb9b51] flex items-center justify-center"
          >
            <svg
              class="w-10 h-10 text-[#cb9b51]"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.5"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
              ></path>
            </svg>
          </div>
          <h1 class="text-3xl font-khmer-moul gold-text mb-2">Admin Access</h1>
          <p class="text-white/40 text-xs uppercase tracking-[0.2em]">
            Rumduol Secure System
          </p>
        </div>

        <div class="space-y-4">
          <input
            type="password"
            id="admin-pass-input"
            class="input-field text-center text-lg tracking-widest"
            placeholder="••••••••"
          />
          <button
            onclick="checkLogin()"
            class="btn-premium gold-bg text-black w-full py-4 rounded-2xl font-bold uppercase tracking-wider"
          >
            Unlock Manager
          </button>
          <p id="login-error" class="text-red-400 text-xs mt-4 hidden">
            Password មិនត្រឹមត្រូវ! សូមព្យាយាមម្ដងទៀត។
          </p>
        </div>
      </div>
    </div>

    <!-- 2. 🌀 LOADING SPINNER -->
    <div
      id="loading"
      class="fixed inset-0 z-[900] hidden items-center justify-center bg-[#092743]/90 backdrop-blur-sm"
    >
      <div class="flex flex-col items-center">
        <div
          class="w-12 h-12 border-4 border-t-[#cb9b51] border-white/10 rounded-full animate-spin mb-4"
        ></div>
        <p class="gold-text font-bold animate-pulse text-sm">Processing...</p>
      </div>
    </div>

    <!-- 3. 📱 MAIN DASHBOARD CONTENT -->
    <div id="main-content" class="pb-24">
      <!-- Header -->
      <header
        class="sticky top-0 z-50 bg-[#092743]/80 backdrop-blur-lg border-b border-white/5 p-6"
      >
        <div class="max-w-4xl mx-auto flex justify-between items-center">
          <div>
            <h2 class="text-xl font-khmer-moul gold-text">Card Manager</h2>
            <p class="text-[10px] text-white/50 uppercase tracking-widest">
              Total: <span id="user-count" class="text-[#cb9b51]">0</span> Users
            </p>
          </div>
          <button
            onclick="openModal()"
            class="btn-premium gold-bg text-black p-3 rounded-xl shadow-lg"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 4v16m8-8H4"
              ></path>
            </svg>
          </button>
        </div>
      </header>

      <main class="max-w-4xl mx-auto p-6">
        <!-- Search Bar -->
        <div class="relative mb-8">
          <input
            type="text"
            id="search"
            onkeyup="renderUsers()"
            placeholder="ស្វែងរកឈ្មោះអតិថិជន..."
            class="input-field pl-12"
          />
          <svg
            class="absolute left-4 top-3.5 w-5 h-5 text-white/30"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            ></path>
          </svg>
        </div>

        <!-- User Cards Grid -->
        <div id="user-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <!-- Cards will load here -->
        </div>
      </main>
    </div>

    <!-- 4. 📝 MODAL FORM (CREATE/EDIT) -->
    <div
      id="modal"
      class="fixed inset-0 z-[600] hidden bg-black/95 overflow-y-auto"
    >
      <div class="min-h-screen flex items-center justify-center p-4">
        <div
          class="bg-[#0c3359] border border-[#cb9b51]/20 w-full max-w-2xl rounded-[32px] p-6 relative"
        >
          <button
            onclick="closeModal()"
            class="absolute top-4 right-4 p-2 text-white/30 hover:text-white"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              ></path>
            </svg>
          </button>

          <h2 id="modal-title" class="text-2xl font-khmer-moul gold-text mb-8">
            New Identity
          </h2>

          <form id="user-form" onsubmit="handleSubmit(event)" class="space-y-6">
            <input type="hidden" id="user-id" />

            <!-- Section 1: Basic Info -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label
                  class="block text-[10px] gold-text mb-1 uppercase font-bold tracking-widest"
                  >Full Name</label
                >
                <input
                  type="text"
                  id="name"
                  class="input-field"
                  placeholder="ឈ្មោះពេញ"
                  required
                />
              </div>
              <div>
                <label
                  class="block text-[10px] gold-text mb-1 uppercase font-bold tracking-widest"
                  >Job Title</label
                >
                <input
                  type="text"
                  id="title"
                  class="input-field"
                  placeholder="តួនាទី"
                />
              </div>
            </div>

            <!-- Section 2: Images -->
            <div class="grid grid-cols-2 gap-4">
              <div class="bg-white/5 p-3 rounded-2xl border border-white/5">
                <label
                  class="block text-[9px] gold-text mb-2 uppercase font-bold"
                  >Logo Image</label
                >
                <input
                  type="file"
                  id="logo_file"
                  accept="image/*"
                  class="text-[10px] text-white/50 w-full"
                />
                <input type="hidden" id="logo_img" />
              </div>
              <div class="bg-white/5 p-3 rounded-2xl border border-white/5">
                <label
                  class="block text-[9px] gold-text mb-2 uppercase font-bold"
                  >Profile Picture</label
                >
                <input
                  type="file"
                  id="profile_file"
                  accept="image/*"
                  class="text-[10px] text-white/50 w-full"
                />
                <input type="hidden" id="profile_img" />
              </div>
            </div>

            <!-- Section 3: Social Links -->
            <div class="grid grid-cols-2 gap-3">
              <input
                type="text"
                id="facebook"
                placeholder="Facebook URL"
                class="input-field text-sm"
              />
              <input
                type="text"
                id="telegram"
                placeholder="Telegram Username"
                class="input-field text-sm"
              />
              <input
                type="text"
                id="whatsapp"
                placeholder="WhatsApp (855...)"
                class="input-field text-sm"
              />
              <input
                type="text"
                id="tiktok"
                placeholder="TikTok URL"
                class="input-field text-sm"
              />
              <input
                type="text"
                id="linkedin"
                placeholder="LinkedIn URL"
                class="input-field text-sm"
              />
              <input
                type="text"
                id="email"
                placeholder="Email Address"
                class="input-field text-sm"
              />
              <input
                type="text"
                id="website"
                placeholder="Website URL"
                class="input-field text-sm"
              />
            </div>

            <!-- Section 4: Phone Numbers -->
            <div class="bg-black/20 p-4 rounded-2xl border border-white/5">
              <label
                class="block text-[10px] gold-text mb-3 uppercase font-bold"
                >Phone Numbers (Max 5)</label
              >
              <div id="phone-container" class="space-y-2">
                <!-- Dynamically added phones -->
              </div>
            </div>

            <!-- Section 5: VCF Detail -->
            <div class="grid grid-cols-3 gap-2">
              <input
                type="text"
                id="vcf_first"
                placeholder="VCF First"
                class="input-field text-xs"
              />
              <input
                type="text"
                id="vcf_last"
                placeholder="VCF Last"
                class="input-field text-xs"
              />
              <input
                type="text"
                id="vcf_org"
                placeholder="Company"
                class="input-field text-xs"
              />
            </div>

            <button
              type="submit"
              class="btn-premium gold-bg text-black w-full py-4 rounded-2xl font-bold uppercase mt-6 shadow-xl"
            >
              Save Card Info
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
      const webAppUrl =
        "https://script.google.com/macros/s/AKfycbwAUxfLefYtpCpoIYCddF6F6UPNLoooMul4GqmjW7YD3vo3wET479HAVpbiwJbXRjjMdw/exec";
      let allUsers = [];
      let ADMIN_SESSION_PW = "";

      // 1. LOGIN SYSTEM
      async function checkLogin() {
        const passInput = document.getElementById("admin-pass-input");
        const errorMsg = document.getElementById("login-error");
        const pw = passInput.value;
        if (!pw) return;

        showLoader(true);
        try {
          const res = await fetch(
            `${webAppUrl}?action=getUsers&pw=${encodeURIComponent(pw)}`,
          );
          const data = await res.json();

          if (data.status === "error") {
            errorMsg.classList.remove("hidden");
          } else {
            ADMIN_SESSION_PW = pw;
            allUsers = data;
            document.getElementById("login-overlay").style.display = "none";
            document.getElementById("main-content").style.display = "block";
            renderUsers();
          }
        } catch (e) {
          alert("Error connecting to server.");
        }
        showLoader(false);
      }

      // 2. DATA RENDERING
      function renderUsers() {
        const query = document.getElementById("search").value.toLowerCase();
        const container = document.getElementById("user-list");
        container.innerHTML = "";

        const filtered = allUsers.filter(
          (u) =>
            String(u.name || "")
              .toLowerCase()
              .includes(query) ||
            String(u.title || "")
              .toLowerCase()
              .includes(query),
        );

        document.getElementById("user-count").innerText = filtered.length;

        filtered.forEach((u) => {
          /* 🛡️ CORRECT PREVIEW LOGIC: Link directly to your Vercel URL */
          const previewLink = `index.html?id=${u.id}`;

          const div = document.createElement("div");
          div.className =
            "bg-white/5 border border-white/10 p-5 rounded-3xl hover:border-[#cb9b51]/40 transition-all";
          div.innerHTML = `
          <div class="flex items-center gap-4">
            <img src="${u.profile_img || "https://via.placeholder.com/150"}" class="w-16 h-16 rounded-full object-cover border border-[#cb9b51]/30">
            <div class="flex-1 min-w-0">
              <h3 class="font-bold text-lg truncate">${u.name || "Untitled"}</h3>
              <p class="text-[10px] gold-text uppercase tracking-widest truncate opacity-70">${u.title || "No Title"}</p>
            </div>
          </div>
          <div class="grid grid-cols-3 gap-2 mt-6">
            <a href="${previewLink}" target="_blank" class="text-[10px] font-bold text-center bg-blue-500/20 text-blue-400 py-2.5 rounded-xl border border-blue-500/20">PREVIEW</a>
            <button onclick="editUser('${u.id}')" class="text-[10px] font-bold bg-gray-500/20 text-gray-300 py-2.5 rounded-xl border border-white/5">EDIT</button>
            <button onclick="confirmDelete('${u.id}')" class="text-[10px] font-bold bg-red-500/20 text-red-400 py-2.5 rounded-xl border border-red-500/20">DELETE</button>
          </div>
        `;
          container.appendChild(div);
        });
      }

      // 3. CREATE / EDIT LOGIC
      async function handleSubmit(e) {
        e.preventDefault();
        showLoader(true);

        const logoFile = document.getElementById("logo_file").files[0];
        const profileFile = document.getElementById("profile_file").files[0];

        let logoBase64 = document.getElementById("logo_img").value;
        let profileBase64 = document.getElementById("profile_img").value;

        if (logoFile) logoBase64 = await toBase64(logoFile);
        if (profileFile) profileBase64 = await toBase64(profileFile);

        const userData = {
          id: document.getElementById("user-id").value,
          name: document.getElementById("name").value,
          title: document.getElementById("title").value,
          logo_img: logoBase64,
          profile_img: profileBase64,
          phones: Array.from(document.querySelectorAll(".phone-input"))
            .map((i) => i.value)
            .filter((v) => v)
            .join(","),
          facebook: document.getElementById("facebook").value,
          telegram: document.getElementById("telegram").value,
          whatsapp: document.getElementById("whatsapp").value,
          tiktok: document.getElementById("tiktok").value,
          linkedin: document.getElementById("linkedin").value,
          email: document.getElementById("email").value,
          website: document.getElementById("website").value,
          vcf_first: document.getElementById("vcf_first").value,
          vcf_last: document.getElementById("vcf_last").value,
          vcf_org: document.getElementById("vcf_org").value,
        };

        const payload = {
          action: "saveUser",
          userData: userData,
          pw: ADMIN_SESSION_PW,
        };

        try {
          await fetch(webAppUrl, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(payload),
          });
          alert("បានរក្សាទុក! សូមរង់ចាំ ២វិនាទី រួច Refresh។");
          setTimeout(async () => {
            closeModal();
            const r = await fetch(
              `${webAppUrl}?action=getUsers&pw=${encodeURIComponent(ADMIN_SESSION_PW)}`,
            );
            allUsers = await r.json();
            renderUsers();
          }, 2000);
        } catch (e) {
          alert("Error saving data.");
        }
        showLoader(false);
      }

      // 4. HELPERS
      function showLoader(show) {
        document.getElementById("loading").style.display = show
          ? "flex"
          : "none";
      }

      function toBase64(file) {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = () => resolve(reader.result);
        });
      }

      function openModal() {
        document.getElementById("user-form").reset();
        document.getElementById("user-id").value = "";
        document.getElementById("logo_img").value = "";
        document.getElementById("profile_img").value = "";
        document.getElementById("modal-title").innerText = "New Identity Card";
        setupPhones("");
        document.getElementById("modal").style.display = "block";
      }

      function closeModal() {
        document.getElementById("modal").style.display = "none";
      }

      function setupPhones(phoneStr) {
        const container = document.getElementById("phone-container");
        container.innerHTML = "";
        const phones = phoneStr ? phoneStr.split(",") : [""];
        phones.forEach((p, i) => {
          const div = document.createElement("div");
          div.className = "flex gap-2";
          div.innerHTML = `<input type="text" class="phone-input input-field text-sm" placeholder="លេខទូរស័ព្ទ ${i + 1}" value="${p}">`;
          if (i === 0)
            div.innerHTML += `<button type="button" onclick="addPhoneField()" class="gold-bg text-black px-4 rounded-xl font-bold">+</button>`;
          container.appendChild(div);
        });
      }

      function addPhoneField() {
        const container = document.getElementById("phone-container");
        if (container.querySelectorAll(".phone-input").length < 5) {
          const div = document.createElement("div");
          div.className = "flex gap-2";
          div.innerHTML = `<input type="text" class="phone-input input-field text-sm" placeholder="លេខបន្ថែម">`;
          container.appendChild(div);
        }
      }

      function editUser(id) {
        const u = allUsers.find((x) => String(x.id) === String(id));
        if (!u) return;
        openModal();
        document.getElementById("modal-title").innerText = "Edit Identity";
        document.getElementById("user-id").value = u.id;
        document.getElementById("name").value = u.name || "";
        document.getElementById("title").value = u.title || "";
        document.getElementById("logo_img").value = u.logo_img || "";
        document.getElementById("profile_img").value = u.profile_img || "";
        document.getElementById("facebook").value = u.facebook || "";
        document.getElementById("telegram").value = u.telegram || "";
        document.getElementById("whatsapp").value = u.whatsapp || "";
        document.getElementById("tiktok").value = u.tiktok || "";
        document.getElementById("linkedin").value = u.linkedin || "";
        document.getElementById("email").value = u.email || "";
        document.getElementById("website").value = u.website || "";
        document.getElementById("vcf_first").value = u.vcf_first || "";
        document.getElementById("vcf_last").value = u.vcf_last || "";
        document.getElementById("vcf_org").value = u.vcf_org || "";
        setupPhones(u.phones);
      }

      async function confirmDelete(id) {
        if (!confirm("តើអ្នកចង់លុបទិន្នន័យនេះមែនទេ?")) return;
        showLoader(true);
        const payload = { action: "deleteUser", id: id, pw: ADMIN_SESSION_PW };
        try {
          await fetch(webAppUrl, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(payload),
          });
          setTimeout(async () => {
            const r = await fetch(
              `${webAppUrl}?action=getUsers&pw=${encodeURIComponent(ADMIN_SESSION_PW)}`,
            );
            allUsers = await r.json();
            renderUsers();
          }, 2000);
        } catch (e) {
          alert("Error deleting user.");
        }
        showLoader(false);
      }
    </script>
  </body>
</html>
