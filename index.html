<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- 📱 Meta Tags សម្រាប់ធ្វើឱ្យដូច App ពិតៗ -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Rumduol Manager" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#092743" />

    <title>Rumduol Manager</title>

    <!-- Tailwind CSS & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Moul&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #092743;
        --gold: #cb9b51;
        --gold-gradient: linear-gradient(
          135deg,
          #f6e27a 0%,
          #d0a446 50%,
          #aa7c11 100%
        );
      }

      body {
        background-color: var(--bg);
        color: white;
        font-family: "Inter", sans-serif;
        /* ការពារការជាប់ពណ៌ខៀវពេលចុចលើទូរស័ព្ទ */
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        /* កំណត់ទំហំឱ្យពេញអេក្រង់ទូរស័ព្ទ */
        min-height: 100vh;
        overflow-x: hidden;
      }

      .font-moul {
        font-family: "Moul", serif;
      }
      .gold-text {
        color: var(--gold);
      }
      .gold-bg {
        background: var(--gold-gradient);
      }

      /* បង្កើត UI ឱ្យដូច Native App */
      .app-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 24px;
      }

      .input-field {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(203, 155, 81, 0.2);
        border-radius: 14px;
        padding: 14px;
        width: 100%;
        color: white;
        outline: none;
        transition: 0.3s;
      }

      .input-field:focus {
        border-color: #f6e27a;
        background: rgba(255, 255, 255, 0.08);
      }

      /* លាក់ Content បើមិនទាន់ Login */
      #main-app {
        display: none;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 0px;
      }
    </style>
  </head>
  <body class="safe-area-inset">
    <!-- 1. 🛡️ SECURE LOGIN OVERLAY (App Style) -->
    <div
      id="login-screen"
      class="fixed inset-0 z-[1000] flex flex-col items-center justify-center bg-[#092743] px-8"
    >
      <div
        class="w-20 h-20 mb-6 rounded-3xl gold-bg flex items-center justify-center shadow-[0_0_30px_rgba(203,155,81,0.3)]"
      >
        <svg
          class="w-10 h-10 text-[#092743]"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
          ></path>
        </svg>
      </div>
      <h1 class="text-2xl font-moul gold-text mb-2">Rumduol Admin</h1>
      <p class="text-white/40 text-[10px] uppercase tracking-[0.3em] mb-8">
        Secure Identity Access
      </p>

      <input
        type="password"
        id="pw-input"
        class="input-field text-center text-xl tracking-[0.5em] mb-4"
        placeholder="••••"
      />
      <button
        onclick="attemptLogin()"
        class="gold-bg text-black w-full py-4 rounded-2xl font-bold uppercase tracking-widest active:scale-95 transition-transform"
      >
        Unlock App
      </button>
      <p id="error-msg" class="text-red-400 text-xs mt-4 hidden">
        Password Incorrect
      </p>
    </div>

    <!-- 2. 📱 MAIN APPLICATION UI -->
    <div id="main-app" class="flex flex-col min-h-screen">
      <!-- Top Bar -->
      <header class="p-6 pt-12 flex justify-between items-center">
        <div>
          <h2 class="text-lg font-moul gold-text">Manager</h2>
          <p class="text-[10px] text-white/30 uppercase tracking-widest">
            <span id="count">0</span> Identity Cards
          </p>
        </div>
        <button
          onclick="openForm()"
          class="w-12 h-12 rounded-2xl gold-bg flex items-center justify-center shadow-lg active:scale-90 transition-transform"
        >
          <svg
            class="w-6 h-6 text-black"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 6v6m0 0v6m0-6h6m-6 0H6"
            ></path>
          </svg>
        </button>
      </header>

      <!-- Search Section -->
      <div class="px-6 mb-6">
        <input
          type="text"
          id="search"
          onkeyup="renderList()"
          placeholder="Search names..."
          class="input-field py-3 text-sm"
        />
      </div>

      <!-- Scrollable List -->
      <div id="user-list" class="flex-1 px-6 space-y-4 pb-20 overflow-y-auto">
        <!-- Cards will load here -->
      </div>
    </div>

    <!-- 3. 🌀 LOADING SYSTEM -->
    <div
      id="loader"
      class="fixed inset-0 z-[1100] hidden items-center justify-center bg-[#092743]/80 backdrop-blur-md"
    >
      <div
        class="w-10 h-10 border-2 border-t-white border-white/10 rounded-full animate-spin"
      ></div>
    </div>

    <!-- 4. 📝 CREATE/EDIT MODAL (Slide Up Style) -->
    <div id="modal" class="fixed inset-0 z-[900] hidden bg-black/90 pt-10">
      <div
        class="bg-[#0c3359] min-h-screen rounded-t-[40px] p-8 overflow-y-auto"
      >
        <div class="flex justify-between items-center mb-8">
          <h3 id="modal-title" class="text-xl font-moul gold-text">New Card</h3>
          <button onclick="closeForm()" class="text-white/40">Close</button>
        </div>

        <form id="form" onsubmit="saveData(event)" class="space-y-5 pb-20">
          <input type="hidden" id="u-id" />
          <input
            type="text"
            id="u-name"
            class="input-field"
            placeholder="Full Name"
            required
          />
          <input
            type="text"
            id="u-title"
            class="input-field"
            placeholder="Job Title"
          />

          <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/5 p-3 rounded-2xl border border-white/5">
              <label class="text-[9px] gold-text uppercase font-bold block mb-2"
                >Logo</label
              >
              <input
                type="file"
                id="f-logo"
                accept="image/*"
                class="text-[10px]"
              />
            </div>
            <div class="bg-white/5 p-3 rounded-2xl border border-white/5">
              <label class="text-[9px] gold-text uppercase font-bold block mb-2"
                >Profile</label
              >
              <input
                type="file"
                id="f-profile"
                accept="image/*"
                class="text-[10px]"
              />
            </div>
          </div>

          <div id="phone-box" class="space-y-2 bg-black/20 p-4 rounded-2xl">
            <label class="text-[10px] gold-text uppercase font-bold"
              >Phones (Max 5)</label
            >
            <!-- Dynamic phones will load here -->
          </div>

          <div class="grid grid-cols-2 gap-2 text-xs">
            <input
              type="text"
              id="u-fb"
              placeholder="Facebook"
              class="input-field"
            />
            <input
              type="text"
              id="u-tg"
              placeholder="Telegram"
              class="input-field"
            />
            <input
              type="text"
              id="u-wa"
              placeholder="WhatsApp"
              class="input-field"
            />
            <input
              type="text"
              id="u-tk"
              placeholder="TikTok"
              class="input-field"
            />
          </div>

          <button
            type="submit"
            class="gold-bg text-black w-full py-4 rounded-2xl font-bold uppercase mt-6 shadow-xl"
          >
            Confirm & Save
          </button>
        </form>
      </div>
    </div>

    <script>
      const API =
        "https://script.google.com/macros/s/AKfycbwAUxfLefYtpCpoIYCddF6F6UPNLoooMul4GqmjW7YD3vo3wET479HAVpbiwJbXRjjMdw/exec";
      let DATA = [];
      let PW = "";

      // 1. Authentication
      async function attemptLogin() {
        const input = document.getElementById("pw-input");
        const error = document.getElementById("error-msg");
        if (!input.value) return;

        toggleLoader(true);
        try {
          const res = await fetch(API, {
            method: "POST",
            body: JSON.stringify({ action: "getUsers", pw: input.value }),
          });
          const json = await res.json();

          if (json.status === "error") {
            error.classList.remove("hidden");
          } else {
            PW = input.value;
            DATA = json;
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main-app").style.display = "flex";
            renderList();
          }
        } catch (e) {
          alert("Server connection failed.");
        }
        toggleLoader(false);
      }

      // 2. Rendering
      function renderList() {
        const query = document.getElementById("search").value.toLowerCase();
        const list = document.getElementById("user-list");
        list.innerHTML = "";

        const filtered = DATA.filter((u) =>
          u.name.toLowerCase().includes(query),
        );
        document.getElementById("count").innerText = filtered.length;

        filtered.forEach((u) => {
          // ⚠️ បញ្ជាក់៖ ឯកសារសម្រាប់សាធារណៈជនមើល card ត្រូវប្តូរឈ្មោះទៅជា user.html
          const previewUrl = `user.html?id=${u.id}`;

          const div = document.createElement("div");
          div.className = "app-card p-4 flex items-center gap-4";
          div.innerHTML = `
          <img src="${u.profile_img || "https://via.placeholder.com/80"}" class="w-14 h-14 rounded-2xl object-cover border border-[#cb9b51]/20">
          <div class="flex-1 min-w-0">
            <h4 class="font-bold truncate text-white">${u.name}</h4>
            <p class="text-[10px] gold-text uppercase truncate">${u.title || "Client"}</p>
          </div>
          <div class="flex flex-col gap-2">
            <button onclick="editItem('${u.id}')" class="bg-white/10 p-2 rounded-lg text-xs">Edit</button>
            <a href="${previewUrl}" target="_blank" class="bg-blue-500/20 text-blue-400 p-2 rounded-lg text-xs text-center">View</a>
          </div>
        `;
          list.appendChild(div);
        });
      }

      // 3. Save Data
      async function saveData(e) {
        e.preventDefault();
        toggleLoader(true);

        const uData = {
          id: document.getElementById("u-id").value,
          name: document.getElementById("u-name").value,
          title: document.getElementById("u-title").value,
          logo_img: (await getFile("f-logo")) || "",
          profile_img: (await getFile("f-profile")) || "",
          phones: Array.from(document.querySelectorAll(".p-in"))
            .map((i) => i.value)
            .join(","),
          facebook: document.getElementById("u-fb").value,
          telegram: document.getElementById("u-tg").value,
          whatsapp: document.getElementById("u-wa").value,
          tiktok: document.getElementById("u-tk").value,
          pw: PW,
        };

        try {
          // ប្រើ mode no-cors សម្រាប់ភាពលឿននៅ Local
          await fetch(API, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
              action: "saveUser",
              userData: uData,
              pw: PW,
            }),
          });
          alert("Success! Re-syncing data...");
          setTimeout(refreshData, 2000);
        } catch (e) {
          alert("Failed to save.");
        }
        toggleLoader(false);
      }

      // 4. Helpers
      function toggleLoader(s) {
        document.getElementById("loader").style.display = s ? "flex" : "none";
      }
      function closeForm() {
        document.getElementById("modal").style.display = "none";
      }
      function openForm() {
        document.getElementById("form").reset();
        document.getElementById("u-id").value = "";
        setupPhoneFields("");
        document.getElementById("modal").style.display = "block";
      }

      async function refreshData() {
        const res = await fetch(API, {
          method: "POST",
          body: JSON.stringify({ action: "getUsers", pw: PW }),
        });
        DATA = await res.json();
        renderList();
        closeForm();
      }

      function setupPhoneFields(str) {
        const box = document.getElementById("phone-box");
        box.innerHTML = `<label class="text-[10px] gold-text uppercase font-bold">Phones (Max 5)</label>`;
        const nums = str ? str.split(",") : [""];
        nums.forEach((n, i) => {
          const d = document.createElement("div");
          d.className = "flex gap-2";
          d.innerHTML = `<input type="text" class="p-in input-field py-2 text-sm" value="${n}" placeholder="Phone ${i + 1}">`;
          if (i === 0)
            d.innerHTML += `<button type="button" onclick="addPhone()" class="gold-bg text-black px-3 rounded-xl">+</button>`;
          box.appendChild(d);
        });
      }

      function addPhone() {
        if (document.querySelectorAll(".p-in").length >= 5) return;
        const d = document.createElement("div");
        d.innerHTML = `<input type="text" class="p-in input-field py-2 text-sm mt-2" placeholder="Extra Phone">`;
        document.getElementById("phone-box").appendChild(d);
      }

      function editItem(id) {
        const u = DATA.find((x) => x.id == id);
        if (!u) return;
        openForm();
        document.getElementById("modal-title").innerText = "Edit Card";
        document.getElementById("u-id").value = u.id;
        document.getElementById("u-name").value = u.name;
        document.getElementById("u-title").value = u.title;
        document.getElementById("u-fb").value = u.facebook;
        document.getElementById("u-tg").value = u.telegram;
        document.getElementById("u-wa").value = u.whatsapp;
        document.getElementById("u-tk").value = u.tiktok;
        setupPhoneFields(u.phones);
      }

      function getFile(id) {
        const f = document.getElementById(id).files[0];
        if (!f) return null;
        return new Promise((r) => {
          const reader = new FileReader();
          reader.onload = (e) => r(e.target.result);
          reader.readAsDataURL(f);
        });
      }
    </script>
  </body>
</html>
